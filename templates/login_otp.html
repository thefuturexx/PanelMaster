<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-indigo-900 flex items-center justify-center h-screen font-sans p-4">
    <div class="bg-white/10 backdrop-blur-lg p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-white/20">
        <h2 class="text-3xl font-black text-white mb-2 tracking-widest uppercase">OTP Verify</h2>
        <p class="text-xs text-indigo-100/80 mb-6 font-semibold">Check your Telegram admin bot chat and enter 6-digit code.</p>

        {% if error %}
        <div class="mb-4 text-left bg-red-500/20 border border-red-300/40 text-red-100 px-3 py-2 rounded-xl text-xs font-bold">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4 mb-3">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
            <input type="text" name="otp_code" inputmode="numeric" maxlength="6" placeholder="123456" required class="w-full bg-black/30 border border-white/10 p-4 rounded-xl text-white placeholder-white/50 tracking-[0.3em] text-center text-lg font-bold focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <button class="w-full bg-indigo-500 hover:bg-indigo-400 text-white p-4 rounded-xl font-bold transition-all transform hover:scale-[1.02] shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                Verify OTP
            </button>
        </form>

        <form action="/login/otp/resend" method="POST" class="m-0">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
            <button class="w-full bg-white/10 hover:bg-white/20 text-white p-3 rounded-xl text-sm font-black border border-white/20 transition">
                Resend OTP
            </button>
        </form>
    </div>
</body>
</html>
